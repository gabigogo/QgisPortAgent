# ============================================================
# ArcGIS to QGIS Migration Brief — Input Template
# ============================================================
# Fill in the sections below, then attach this file and the
# source ArcGIS tool to your agent session. The agent will read
# it and proceed directly to triage and migration planning.
#
# MINIMUM REQUIRED: sections 1, 2, and 3.
# Everything else has sensible defaults.
# ============================================================

# ------------------------------------------------------------
# 1. IDENTITY (Target QGIS Plugin)
# ------------------------------------------------------------
identity:
  plugin_name: null        # lowercase, underscores, no spaces — e.g. viewshed_heatmap
  display_name: null       # shown in QGIS Plugin Manager — e.g. "Viewshed Heatmap"
  description: null        # one sentence describing what the migrated plugin does
  author: null             # e.g. "Jane Smith"
  organisation: null       # e.g. "Acme GIS Ltd" — or null if individual
  email: null              # contact email for metadata.txt

# ------------------------------------------------------------
# 2. SOURCE ARCGIS TOOL
# ------------------------------------------------------------
source:
  file_path: null          # Exact path to the .py, .pyt, .tbx, or .atbx file
  tool_name: null          # If a toolbox (.tbx/.pyt/.atbx), specify the EXACT tool name to migrate
  original_type: null      # e.g. Script Tool, ModelBuilder, Python Toolbox
  known_licenses: []       # e.g. [Spatial Analyst, Advanced] (leave empty if unknown)
  
# ------------------------------------------------------------
# 3. MIGRATION SCOPE
# ------------------------------------------------------------
# Choose ONE of the following (set to true)
#   full          — Plugin scaffold + tests + migration report + requirements.txt
#   skip-test     — Plugin scaffold + migration report + requirements.txt (no tests)
#   scaffold-only — Plugin directory only (metadata.txt, __init__.py, provider, algorithm)
#   tests-only    — pytest stubs + validation scripts only
#   report-only   — Migration report with confidence scoring only (no code generation)
scope:
  full: true
  skip_test: false
  scaffold_only: false
  tests_only: false
  report_only: false

# ------------------------------------------------------------
# 4. PRE-MIGRATION CONTEXT
# ------------------------------------------------------------
context:
  problem_statement: null
  # What does the original tool do? 
  # Example: "This tool calculates zonal statistics for depression areas and outputs a table."
  
  known_inputs: []
  # List the expected inputs (e.g. Raster, Vector Polygons, String parameter)
  
  known_outputs: []
  # List the expected outputs (e.g. CSV, Vector Lines, Raster)

# ------------------------------------------------------------
# 5. CONSTRAINTS & NON-NEGOTIABLES
# ------------------------------------------------------------
# Hard constraints the agent must respect during migration.
# The agent already follows best practices (e.g., using pyogrio, pandas, avoiding Python 2).
constraints: []
# Examples:
#   - "Input datasets might exceed 2GB, favor chunked read/write if using GeoPandas."
#   - "Must use native QGIS algorithms in the processing chain where possible instead of custom Python logic."

# ------------------------------------------------------------
# 6. TESTING & VALIDATION
# ------------------------------------------------------------
testing:
  enabled: true
  test_data: null            # path to sample file, or null to use synthetic fixtures
  # Framework: pytest (default)
  
# ------------------------------------------------------------
# 7. REFERENCE MATERIAL
# ------------------------------------------------------------
references: []
# Optional links or files to help the agent understand the original tool.
# Examples:
#   - type: esri_doc
#     url: "https://pro.arcgis.com/en/pro-app/latest/tool-reference/..."
#   - type: sample_data
#     path: "test/dem_channel_comparison/output-sample-points.gpkg"

# ------------------------------------------------------------
# 8. OPEN QUESTIONS
# ------------------------------------------------------------
# Anything you are unsure about regarding the translation or QGIS equivalent.
open_questions: []
# Examples:
#   - "Not sure what the exact QGIS equivalent is for ArcPy's TabulateArea."
# ============================================================
# Template version: 1.0 — ArcGIS to QGIS Migration Agent
# ============================================================
