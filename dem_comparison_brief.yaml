# ============================================================
# QGIS Plugin Brief — DEM Comparison along Channel Centrelines
# ============================================================

# ------------------------------------------------------------
# 1. IDENTITY
# ------------------------------------------------------------
identity:
  plugin_name: dem_bathy_review
  display_name: "DEM Bathymetry Comparison Report"
  description: >
    Compares two raster DEMs within buffered zones around channel centreline
    features, computing per-feature difference statistics and exporting a
    polished HTML report with embedded CSS.
  author: "gabriela govea"           
  organisation: "AtkinsRealis"
  email: "gabriela.govea@atkinsrealis.com"         

# ------------------------------------------------------------
# 2. PROBLEM & PURPOSE
# ------------------------------------------------------------
purpose:
  problem_statement: >
    Hydrologists and geomorphologists need to quantify terrain change between
    two DEM rasters (e.g. pre/post flood, repeat lidar acquisition) specifically
    within the active channel corridor defined by surveyed centreline vectors.
    Existing workflows require manual buffering, raster clipping, and spreadsheet
    statistics — a multi-step process with no repeatable reporting output.
    This tool automates the entire comparison pipeline and produces a
    self-contained HTML report for each run.

# ------------------------------------------------------------
# 3. PLUGIN ARCHETYPE
# ------------------------------------------------------------
archetype:
  processing_provider: true   # exposed in Processing Toolbox; batch-runnable
  interactive_tool: false
  automation_workflow: false
  visualization: false
  hybrid: false
  hybrid_components: []

# ------------------------------------------------------------
# 4. GEOPROCESSING WORKFLOW
# ------------------------------------------------------------
geoprocessing_workflow:

  - step: 1
    description: >
      Validate inputs. Confirm both DEM rasters are readable, the centreline
      vector layer is valid, and the buffer distance and sample spacing
      parameters are positive numbers.
    input: "DEM raster A, DEM raster B, centreline vector layer, buffer distance, sample spacing"
    output: "Validated parameter set — raise QgsProcessingException on failure"
    notes: >
      Check that both rasters have a defined CRS. Reject point or polygon
      geometry types in the centreline layer — only LineString / MultiLineString
      accepted.

  - step: 2
    description: >
      Reproject all inputs to a shared projected CRS. Use the CRS of DEM A
      as the target unless the user overrides it. Reproject DEM B and the
      centreline layer in-memory using rasterio.warp and geopandas.to_crs.
    input: "DEM A (native CRS), DEM B (native CRS), centreline layer (native CRS)"
    output: "DEM A array + transform, DEM B array + transform, centreline GeoDataFrame — all in shared CRS"
    notes: >
      Use rasterio.warp.reproject for rasters. Use geopandas GeoDataFrame.to_crs()
      for the vector layer. Store reprojected rasters in memory (MemoryFile) —
      do not write to disk.

  - step: 3
    description: >
      Buffer each centreline feature by the user-specified distance to create
      a zonal polygon for that feature. Use shapely geometry buffer with
      cap_style=flat and join_style=round.
    input: "Centreline GeoDataFrame (shared CRS), buffer_distance (metres)"
    output: "Buffered polygon GeoDataFrame — one polygon per centreline feature"
    notes: >
      Preserve the feature identification field (or fall back to the feature
      index / FID) as a column on the output GeoDataFrame for report labelling.

  - step: 4
    description: >
      For each buffered polygon, generate a regular grid of sample points at
      the user-specified fixed spacing distance. Only retain points that fall
      within the polygon boundary (inclusive).
    input: "Buffered polygon geometry, sample_spacing (metres)"
    output: "Array of (x, y) sample point coordinates within the polygon"
    notes: >
      Generate the grid from the polygon bounding box then filter with
      shapely.vectorized.contains or geopandas within. Minimum 3 valid sample
      points required per zone — log a warning and skip the zone if fewer
      points are available.

  - step: 5
    description: >
      Sample both DEM rasters at each point coordinate using rasterio.
      Compute the elevation difference (DEM A − DEM B) at each sample point.
      Track NoData values separately. Accumulate a per-point record for every
      sampled coordinate across all zones for later vector export.
    input: "Sample point coordinates (x, y), DEM A (rasterio dataset), DEM B (rasterio dataset), feature_id"
    output: >
      Per-point arrays: elev_a[], elev_b[], diff[] = elev_a - elev_b,
      nodata_mask[] (bool).
      Per-point record list (all zones combined):
        feature_id, x, y, elev_a, elev_b, diff, is_nodata (bool)
    notes: >
      Use rasterio.sample() for point sampling. Identify NoData using each
      raster's nodata value or masked array. A point is NoData if either
      raster returns NoData at that location.
      Append every sampled point — including NoData points — to a master
      point list so the complete sample grid is preserved in the vector output.

  - step: 6
    description: >
      Compute per-feature statistics from the valid (non-NoData) difference
      array for each buffered zone.
    input: "diff[] (valid values only), nodata_mask[]"
    output: >
      Per-feature record:
        feature_id, nodata_count, max_diff, min_diff,
        median_diff, std_dev, bias, rmse
    notes: >
      Definitions:
        nodata_count = number of sample points where either raster was NoData
        max_diff     = max(diff[valid])
        min_diff     = min(diff[valid])
        median_diff    = median(diff[valid])
        std_dev      = std(diff[valid])
        bias         = mean(diff[valid])   # signed mean error
        rmse         = sqrt(mean(diff[valid]**2))
      Use numpy for all array operations.

  - step: 7
    description: >
      Compute overall summary statistics across all per-feature records.
    input: "List of per-feature records"
    output: >
      Summary record:
        overall_min_diff, overall_max_diff,
        rmse_min, rmse_max, rmse_median,
        bias_min, bias_max, bias_median,
        std_dev_min, std_dev_max, std_dev_median
    notes: "Use numpy or pandas for summary aggregation."

  - step: 8
    description: >
      Render the HTML report using Jinja2. Embed all CSS inline within the
      <style> block of the output HTML file. The report contains:
        (a) Run metadata — input file paths, buffer distance, sample spacing,
            target CRS, run timestamp. LaTex equation showing how diff is computed. 
        (b) Summary statistics table — overall_min_diff, overall_max_diff,
            rmse (min/max/median), bias (min/max/median), std_dev (min/max/median)
        (c) Per-feature statistics table — feature_id, nodata_count,
            max_diff, min_diff, median_diff, std_dev, bias, rmse
      CSS must be minimal, professional, and fully embedded — no external
      stylesheets or CDN links.
    input: "Per-feature records list, summary record, run metadata dict"
    output: "Rendered HTML string"
    notes: >
      Use jinja2.Environment with a string template (no external template files).
      All numeric values in the tables must be formatted to 4 decimal places.
      Tables must be sortable by column header (pure CSS — no external JS
      libraries and no inline JavaScript).

  - step: 9
    description: >
      Assemble all per-point records collected across every zone into a
      geopandas GeoDataFrame of Point geometries and write it to the
      user-specified output vector path.
    input: >
      Master per-point record list:
        feature_id, x, y, elev_a, elev_b, diff, is_nodata;
      output_points_path, shared CRS
    output: "Point vector file on disk (GeoPackage or Shapefile, driver inferred from extension)"
    notes: >
      Construct shapely.geometry.Point objects from (x, y) for each record.
      Create a GeoDataFrame with columns: feature_id, elev_a, elev_b, diff,
      is_nodata. Set the CRS to the shared processing CRS. Write using
      GeoDataFrame.to_file() — driver is inferred from the output_points_path
      extension (default .gpkg → GeoPackage). Confirm the parent directory
      exists before writing. NoData points are included in the output with
      elev_a, elev_b, and diff set to NaN and is_nodata = True.

  - step: 10
    description: >
      Write the rendered HTML string to the user-specified output file path
      and surface a success message in the QGIS message bar.
    input: "Rendered HTML string, output_html_path"
    output: "HTML file on disk"
    notes: >
      Use UTF-8 encoding. Confirm the parent directory exists before writing.
      Push a QgsMessageBar success notification with the output file path.

# ------------------------------------------------------------
# 5. DATA
# ------------------------------------------------------------
data:
  inputs:
    - data_type: "Raster — DEM (Survey A)"
      formats: [GeoTIFF]
      notes: "Single-band elevation raster. Any projected or geographic CRS."

    - data_type: "Raster — DEM (Survey B)"
      formats: [GeoTIFF]
      notes: "Single-band elevation raster. Must overlap spatially with DEM A."

    - data_type: "Vector — Channel Centrelines"
      formats: [QGIS Vecor Layer, GeoPackage, Shapefile, any OGR-supported format]
      notes: >
        LineString or MultiLineString features. One statistical record produced
        per feature. If a QGIS Vector Layer is provided. Allow the user to only
        process the selected features. 

  outputs:
    - data_type: "HTML Report"
      formats: [HTML]
      notes: >
        Self-contained file with embedded CSS. Contains run metadata,
        per-feature statistics table, and summary statistics table.
        Do not use Javascript. 

    - data_type: "Vector — Sample Points"
      formats: [GeoPackage, Shapefile, any OGR-supported format]
      notes: >
        Point layer containing every sampled grid point across all centreline
        zones. Attributes per point: feature_id, elev_a, elev_b, diff,
        is_nodata. NoData points are included with elev_a / elev_b / diff
        set to NaN and is_nodata = True. CRS matches the shared processing CRS.

# ------------------------------------------------------------
# 6. KEY FEATURES
# ------------------------------------------------------------
features:
  - name: "Per-feature zonal DEM comparison"
    description: >
      Buffer each centreline feature, generate sample points at fixed spacing,
      sample both DEMs, and compute NoData Count, Max Diff, Min Diff, Mean Diff,
      Std Dev, Bias, and RMSE per feature.
    priority: MVP

  - name: "Configurable buffer distance"
    description: >
      User-specified buffer distance (metres) applied to each centreline feature
      to define the comparison zone.
    priority: MVP

  - name: "Configurable sample spacing"
    description: >
      User-specified fixed-interval point spacing (metres) for sampling within
      each zonal polygon.
    priority: MVP

  - name: "Automatic CRS harmonisation"
    description: >
      All inputs temporarily reprojected to a shared projected CRS (defaulting
      to DEM A's CRS) before processing. No permanent files written.
    priority: MVP

  - name: "Feature identification field"
    description: >
      Optional parameter to nominate a field from the centreline layer as the
      feature label in the report. Falls back to FID when not specified.
    priority: MVP

  - name: "Embedded HTML report with Jinja2"
    description: >
      Self-contained HTML report with embedded CSS rendered via Jinja2.
      Two tables: per-feature statistics and overall summary statistics.
      Run metadata (input paths, parameters, timestamp) captured in report header.
    priority: MVP

  - name: "Summary statistics table"
    description: >
      Overall min/max difference, and min/max/median for RMSE, Bias, and
      Std Dev across all zones.
    priority: MVP

  - name: "NoData handling and reporting"
    description: >
      Points where either DEM returns NoData are excluded from statistics.
      NoData count reported per feature. Warning logged if a zone has too few
      valid points.
    priority: MVP

  - name: "Sample point export to vector file"
    description: >
      Collect all sample points generated across every centreline zone and
      write them as a Point vector layer (GeoPackage by default). Each point
      carries the attributes: feature_id, elev_a, elev_b, diff, is_nodata.
      NoData points are included in the output with NaN elevation/diff values
      and is_nodata = True, preserving the full sample grid for QA and
      visualisation in QGIS.
    priority: MVP

  - name: "Multi-band DEM support"
    description: >
      Allow user to select which band to read from multi-band rasters.
    priority: Future

  - name: "Export per-feature stats to GeoPackage"
    description: >
      Optionally write per-feature statistics as attributes back to a vector
      layer in a GeoPackage alongside the HTML report.
    priority: Future

# ------------------------------------------------------------
# 7. CONSTRAINTS & NON-NEGOTIABLES
# ------------------------------------------------------------
constraints:
  - "All CSS must be embedded within the HTML output file — no external stylesheets or CDN links"
  - "No intermediate raster files written to disk — use rasterio MemoryFile for reprojected rasters"
  - "Jinja2 must be used for HTML report rendering"
  - "numpy must be used for all statistical computations"
  - "Only LineString / MultiLineString centreline geometries accepted — raise clear error for other types"
  - "Minimum 3 valid sample points required per zone before computing statistics"
  - "Report numeric values formatted to 4 decimal places"

# ------------------------------------------------------------
# 8. USER INTERFACE
# ------------------------------------------------------------
ui:
  type: processing_toolbox
  layout_description: >
    Standard QGIS Processing algorithm dialog with the following parameters:
      - DEM A (raster layer input)
      - DEM B (raster layer input)
      - Channel Centrelines (vector layer input — LineString only)
      - Buffer Distance (QgsProcessingParameterDistance, default 50 m)
      - Sample Spacing (QgsProcessingParameterDistance, default 10 m)
      - Feature ID Field (QgsProcessingParameterField, optional, from centreline layer)
      - Target CRS (QgsProcessingParameterCrs, optional, defaults to DEM A CRS)
      - Output Sample Points (QgsProcessingParameterVectorDestination, Point geometry, optional)
      - Output HTML Report (QgsProcessingParameterFileDestination, *.html)

# ------------------------------------------------------------
# 9. TESTING
# ------------------------------------------------------------
testing:
  enabled: false
  test_data: null   # agent should generate synthetic GeoTIFF DEMs and GeoPackage centrelines
  # Defaults: pytest, 70% minimum coverage

# ------------------------------------------------------------
# 10. REFERENCE MATERIAL
# ------------------------------------------------------------
references:
  - type: library_docs
    url: "https://pythonhosted.org/rasterstats/manual.html"
    notes: "rasterstats — zonal statistics API and usage patterns"

  - type: library_docs
    url: "https://rasterio.readthedocs.io/en/stable/topics/reproject.html"
    notes: "rasterio reprojection — rasterio.warp.reproject for in-memory CRS transformation"

  - type: library_docs
    url: "https://rasterio.readthedocs.io/en/stable/topics/memory-files.html"
    notes: "rasterio MemoryFile — in-memory raster datasets to avoid disk writes"

  - type: library_docs
    url: "https://rasterio.readthedocs.io/en/stable/api/rasterio.html"
    notes: "rasterio API reference — dataset.sample(), dataset.read(), nodata handling"

  - type: library_docs
    url: "https://geopandas.org/en/stable/docs/reference/geodataframe.html"
    notes: "geopandas GeoDataFrame — to_crs(), buffer(), within(), spatial operations"

  - type: library_docs
    url: "https://shapely.readthedocs.io/en/stable/"
    notes: "shapely — geometry buffering, point-in-polygon, vectorized contains"

  - type: library_docs
    url: "https://jinja.palletsprojects.com/en/stable/templates/"
    notes: "Jinja2 template designer docs — filters, loops, whitespace control for HTML rendering"

  - type: library_docs
    url: "https://jinja.palletsprojects.com/en/stable/api/"
    notes: "Jinja2 API — Environment, from_string(), render() for programmatic template use"

# ------------------------------------------------------------
# 11. OPEN QUESTIONS
# ------------------------------------------------------------
open_questions:
  - >
    Should the target CRS parameter default silently to DEM A's CRS, or always
    prompt the user to confirm the CRS before processing begins? Yes, default silently to DEM A's CRS.
  - >
    Should zones with fewer than the minimum valid sample points be silently
    skipped (with a warning in the log) or cause the entire algorithm to fail? Yes silently skip with a warning in the log. 
  - >
    Is a purely CSS-based sortable table acceptable for the report, or is a
    small amount of inline JavaScript permissible? Do not use JavaScript. 

