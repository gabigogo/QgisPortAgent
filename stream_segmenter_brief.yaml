# ============================================================
# QGIS Plugin Brief — stream_segmenter
# AtkinsRealis / Gabriela Govea
# ============================================================

# ------------------------------------------------------------
# 1. IDENTITY
# ------------------------------------------------------------
identity:
  plugin_name: stream_segmenter
  display_name: "Stream Segmenter"
  description: >
    Segments stream centerline features (LineString / MultiLineString)
    into equal-length intervals measured from the downstream endpoint
    outward, and labels each segment with a range label, segment number,
    and unique stream–segment identifier.
  author: "Gabriela Govea"
  organisation: "AtkinsRealis"
  email: gabriela.govea@atkinsrealis.com

# ------------------------------------------------------------
# 2. PROBLEM & PURPOSE
# ------------------------------------------------------------
purpose:
  problem_statement: >
    GIS analysts working with HEC-RAS or WPT channel centerlines need to
    divide long stream features into spatially consistent, equal-length
    segments for hydraulic analysis, reporting, and mapping. Each segment
    must carry a unique identifier that encodes the stream name and its
    ordinal position measured from the downstream end of the channel.
    Currently this is a manual, error-prone multi-step process in QGIS or
    ArcGIS.

# ------------------------------------------------------------
# 3. PLUGIN ARCHETYPE
# ------------------------------------------------------------
archetype:
  processing_provider: true
  interactive_tool: false
  automation_workflow: false
  visualization: false
  hybrid: false
  hybrid_components: []

# ------------------------------------------------------------
# 4. GEOPROCESSING WORKFLOW
# ------------------------------------------------------------
geoprocessing_workflow:
  - step: 1
    description: >
      Load the input vector line layer. If the layer is a QGIS
      in-memory or file-backed layer AND "Process selected features only"
      is True, restrict iteration to selected features (QgsFeatureRequest
      filtered by selectedFeatureIds). Otherwise iterate all features.
    input: Stream centerline layer (LineString / MultiLineString, any OGR-readable format or QGIS memory layer)
    output: Feature iterator (filtered or unfiltered)
    notes: >
      QgsProcessingParameterFeatureSource with QgsProcessing.TypeVectorLine.
      parameterAsVectorLayer used to access selectedFeatureIds().

  - step: 2
    description: >
      Validate each feature's geometry. Skip null geometries and non-line
      types with a non-fatal warning via feedback.reportError.
    input: Individual feature geometry
    output: Valid line geometry or skip signal
    notes: null

  - step: 3
    description: >
      Read the stream name from the user-specified name field.
      Sanitize: strip surrounding whitespace, replace interior spaces
      with underscores. Fall back to "feature_<id>" if the field is NULL
      or empty.
    input: Feature attribute table, stream name field
    output: sanitized stream_name string
    notes: Accepts both string and integer field types.

  - step: 4
    description: >
      Convert the QgsGeometry to a shapely geometry via WKB. Orient the
      line so traversal starts at the downstream endpoint (last vertex
      of a LineString; last vertex of the last part for MultiLineString).
      For MultiLineString, linemerge is used to resolve the parts into a
      single connected chain; disconnected features are skipped.
    input: Feature QgsGeometry (LineString or MultiLineString)
    output: Oriented shapely LineString (first coord = downstream)
    notes: >
      Uses shapely.ops.linemerge for MultiLineString; 1e-6 coordinate
      tolerance for endpoint matching. Skips with warning if merge fails.

  - step: 5
    description: >
      Measure total geodetic feature length in metres using
      QgsDistanceArea with the project ellipsoid (default GRS80).
      Convert the user-specified segment_length to metres (× 1609.344
      for miles, × 1000 for km). Compute n_segs = ceil(total_m / seg_m).
    input: Oriented shapely LineString, QgsDistanceArea, segment_length, use_km
    output: total_m (float), n_segs (int), total_user_units (float)
    notes: >
      When QgsDistanceArea cannot use ellipsoidal measurement (no CRS
      ellipsoid), a warning is pushed but processing continues.

  - step: 6
    description: >
      For each segment i in range(n_segs), compute normalised fractional
      positions start_frac = i*seg_m/total_m and end_frac = min(..., 1.0).
      Cut the oriented line using shapely.ops.substring(line, start_frac,
      end_frac, normalized=True). Discard degenerate zero-length results.
    input: Oriented shapely LineString, start_frac, end_frac
    output: shapely LineString segment geometry
    notes: >
      Segmentation uses Euclidean (native CRS) fractions derived from
      geodetic total length. Acceptable approximation for projected CRS;
      geographic CRS users are warned to use a projected input.

  - step: 7
    description: >
      For each cut segment (1-indexed from downstream) compute the three
      new attribute fields:
        • seg_num        — int, 1-based from downstream
        • mile_range     — string range label, e.g. "0-1 mi" or "0-1 km"
                           (whole values formatted as integers)
        • stream_seg_id  — "<stream_name>_mile_<NN>" or "_km_<NN>",
                           zero-padded to at least 2 digits, expanding
                           to 3+ when n_segs > 99.
    input: Segment index i, segment_length, total_user_units, stream_name, unit config
    output: seg_num (int), mile_range (str), stream_seg_id (str)
    notes: null

  - step: 8
    description: >
      Optionally copy all source feature attributes to the output row
      (controlled by preserve_source_attributes boolean, default False).
      Source field names colliding with the three new field names receive
      a "_src" suffix in the output schema. Append the three new field
      values. Write the output feature to the QgsFeatureSink.
    input: Segment geometry + attributes, QgsFeatureSink
    output: Output vector line layer (LineString, same CRS as input)
    notes: >
      Respects feedback.isCanceled() at the top of both the feature loop
      and the inner segment loop. Progress reported via feedback.setProgress().

# ------------------------------------------------------------
# 5. DATA
# ------------------------------------------------------------
data:
  inputs:
    - data_type: Vector — LineString / MultiLineString
      formats: [GeoPackage, Shapefile, GeoJSON, FileGDB, PostGIS, QGIS memory layer, any OGR-readable]
      notes: >
        Selection-aware when "Process selected features only" is True.
        One stream name per feature assumed.

  outputs:
    - data_type: Vector — LineString (single-part)
      formats: [GeoPackage, Shapefile, Temporary Layer]
      notes: >
        All output segments are single-part LineString regardless of input
        geometry type. CRS inherited from input.
        Three new fields: seg_num (Int), mile_range (String 30),
        stream_seg_id (String 100). Optionally includes source attribute copies.

# ------------------------------------------------------------
# 6. KEY FEATURES
# ------------------------------------------------------------
features:
  - name: Downstream-anchored segmentation
    description: >
      Segment 1 and range label "0-1 mi" always originate at the channel
      mouth (last vertex of the input feature), ensuring consistent
      reporting across datasets.
    priority: MVP

  - name: MultiLineString support
    description: >
      Resolves multipart channel geometries into a single ordered chain
      via shapely.ops.linemerge before segmenting. Features with
      disconnected parts are skipped with a warning.
    priority: MVP

  - name: Configurable segment length with unit toggle
    description: >
      Numeric parameter (default 1.0, min 0.01). Boolean toggle switches
      between miles (default) and kilometres. Range labels and stream_seg_id
      suffix reflect the chosen unit.
    priority: MVP

  - name: Selected-features-only processing
    description: >
      Boolean parameter (default False) restricts processing to features
      selected in the source QGIS layer.
    priority: MVP

  - name: Preserve source attributes toggle
    description: >
      Boolean parameter (default False). When True, all original input fields
      are copied to each output segment row before the three new fields.
    priority: MVP

  - name: Progress reporting and cancellation
    description: >
      Per-feature progress via feedback.setProgress(); supports mid-run
      cancellation via feedback.isCanceled() in both the feature and segment
      loops.
    priority: MVP

  - name: Custom ID format template
    description: >
      Allow the user to supply a Python-style format string for stream_seg_id
      (e.g. "{name}_seg{n:03d}").
    priority: Future

  - name: Batch multi-layer processing
    description: >
      Process multiple stream layers in a single run, writing output segments
      to separate layers or a single merged layer.
    priority: Future

# ------------------------------------------------------------
# 7. CONSTRAINTS & NON-NEGOTIABLES
# ------------------------------------------------------------
constraints:
  - "Must work fully offline — no internet access during processing"
  - "Must be compatible with QGIS 3.44 LTR only (qgisMinimumVersion=3.44)"
  - "Output layer CRS must always match input layer CRS exactly"
  - "One stream name per input feature — no grouping across features"
  - "All output segments are single-part LineString regardless of input geometry type"

# ------------------------------------------------------------
# 8. USER INTERFACE
# ------------------------------------------------------------
ui:
  type: processing_toolbox
  layout_description: >
    Standard QGIS Processing algorithm dialog with auto-generated UI.
    Parameters in display order:
      1. Input stream centerline layer  (QgsProcessingParameterFeatureSource, TypeVectorLine)
      2. Stream name field              (QgsProcessingParameterField — any type, tied to INPUT)
      3. Process selected features only (QgsProcessingParameterBoolean, default False)
      4. Segment length                 (QgsProcessingParameterNumber — Double, default 1.0, min 0.01)
      5. Use kilometres instead of miles(QgsProcessingParameterBoolean, default False)
      6. Preserve source attributes     (QgsProcessingParameterBoolean, default False)
      7. Segmented streams (output)     (QgsProcessingParameterFeatureSink)

# ------------------------------------------------------------
# 9. TESTING
# ------------------------------------------------------------
testing:
  enabled: true
  test_data: null
  # Pure-Python helpers tested with synthetic shapely fixtures (no QGIS required).
  # QGIS integration test uses a synthetic in-memory LineString layer.
  # Run non-QGIS tests:  pytest stream_segmenter/tests/ -v -m "not qgis"

# ------------------------------------------------------------
# 10. REFERENCE MATERIAL
# ------------------------------------------------------------
references:
  - type: existing_plugin_pattern
    path: "dem_bathy_review/processing_provider/algorithms/dem_bathy_review_algorithm.py"
    notes: "Template for algorithm structure, feedback patterns, and QgsFields construction"
  - type: glossary
    notes: >
      WPT Glossary terms relevant to this plugin: UnitNumber, SubReach,
      Channel Segment, Downstream, River Station. Stream name field may
      contain HCFCD Unit Numbers or descriptive names.

# ------------------------------------------------------------
# 11. OPEN QUESTIONS
# ------------------------------------------------------------
open_questions:
  - >
    Coordinate system handling (resolved in implementation):
    QgsDistanceArea with the project ellipsoid (GRS80 fallback) provides
    geodetic lengths in metres regardless of input CRS. Fractional cuts
    via shapely.ops.substring use Euclidean (native CRS) proportions —
    an acceptable approximation for projected inputs. A warning is pushed
    to the Processing log when ellipsoidal measurement is unavailable.

